<html>
<head>
    <title>SILVY HUNTER V8: WORLDWIDE CONTRACT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #ff2e2e;
            --bg: #050505;
            --hud-bg: rgba(0, 0, 0, 0.95);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; color: white;
        }

        #pano {
            width: 100%;
            height: 100%;
            background: #000;
        }

        .hud-container {
            position: absolute;
            z-index: 1000;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #top-left-hud { top: 20px; left: 20px; }
        #top-right-hud { bottom: 20px; right: 20px; text-align: right; }

        .hud-box {
            background: var(--hud-bg);
            border: 1px solid #333;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border-left: 4px solid var(--primary);
        }

        .target-label {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 3px;
            margin: 0;
        }

        .status-text {
            font-family: monospace;
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        #radar-container {
            margin-top: 15px;
            width: 250px;
            height: 12px;
            background: #111;
            border: 1px solid #444;
            position: relative;
        }

        #radar-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.3s ease;
        }

        #stealth-status {
            font-weight: bold;
            transition: color 0.3s;
        }

        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 5000;
        }

        .punch-flash { animation: flash-anim 0.4s ease-out; }
        @keyframes flash-anim { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        .start-btn {
            margin-top: 20px;
            padding: 15px 40px;
            background: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            display: none;
        }

        .upload-btn {
            margin-top: 10px;
            padding: 10px 20px;
            background: #222;
            color: #aaa;
            border: 1px solid #444;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            background: #333;
            color: white;
            border-color: var(--primary);
        }

        #target-preview-container {
            margin-top: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #target-preview {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border: 2px solid var(--primary);
            border-radius: 50%;
            margin-bottom: 10px;
        }

        #target-name-input {
            margin-top: 15px;
            padding: 10px;
            background: #111;
            border: 1px solid #444;
            color: var(--primary);
            font-family: monospace;
            text-align: center;
            width: 250px;
            text-transform: uppercase;
            letter-spacing: 2px;
            outline: none;
        }

        #target-name-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        #debug-log {
            margin-top: 20px;
            font-family: monospace;
            font-size: 10px;
            color: #444;
            max-width: 400px;
            text-align: left;
            max-height: 100px;
            overflow-y: hidden;
        }

        #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        #explosion-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9500;
            display: none; align-items: center; justify-content: center;
        }

        #explosion-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .win-title { font-size: 50px; font-weight: 900; color: var(--primary); margin: 0; letter-spacing: 5px; }
        .btn-reset { 
            margin-top: 30px; padding: 15px 50px; background: var(--primary); border: none; 
            color: white; font-weight: bold; cursor: pointer; letter-spacing: 2px;
        }

        @keyframes shake-anim {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>

    <div id="debug-log"></div>
</div>

<div class="hud-container" id="top-left-hud">

<div class="hud-container" id="top-right-hud">

<div id="pano"></div>
<div id="flash"></div>

    <button class="btn-reset" onclick="location.reload()">NEXT CONTRACT</button>

<div id="explosion-container">

    const DEFAULT_SILVY_IMG = 'Sylvester.png';
    
    let targetImageUrl = DEFAULT_SILVY_IMG;
    let targetName = 'SILVY';
    let systemReady = false;

    // Initialize UI
    document.addEventListener('DOMContentLoaded', () => {
        const nameInput = document.getElementById('target-name-input');
        if (nameInput) nameInput.value = targetName;
        syncTargetData();
    });

    function handleTargetUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            targetImageUrl = e.target.result;
            
            // Auto-fill name if empty
            const nameInput = document.getElementById('target-name-input');
            if (!nameInput.value || nameInput.value === 'SILVY') {
                nameInput.value = file.name.split('.')[0].toUpperCase();
            }
            
            log("New face scans uploaded.");
            syncTargetData();
        };
        reader.readAsDataURL(file);
    }

    function useDefaultTarget() {
        targetImageUrl = DEFAULT_SILVY_IMG;
        targetName = 'SILVY';
        document.getElementById('target-name-input').value = 'SILVY';
        syncTargetData();
        log("Resetting to target: SILVY");
    }

    function syncTargetData() {
        const inputVal = document.getElementById('target-name-input').value.trim();
        targetName = inputVal || "SILVY";

        // 1. Update Loading Screen Preview
        const preview = document.getElementById('target-preview');
        const previewContainer = document.getElementById('target-preview-container');
        
        if (preview) {
            preview.src = targetImageUrl;
            document.getElementById('target-name-display').innerText = "TARGET: " + targetName;
            previewContainer.style.display = 'flex';
        }

        // 2. Update HUD
        const hudLabel = document.getElementById('hud-target-label');
        if (hudLabel) hudLabel.innerText = "TARGET: " + targetName;

        // 3. Update Marker in real-time
        if (silvyMarker) {
            silvyMarker.setIcon({
                url: targetImageUrl,
                scaledSize: new google.maps.Size(180, 180),
                anchor: new google.maps.Point(90, 90)
            });
            log("Satellite recalibrating to " + targetName + "'s signature.");
        }

        checkStartAvailability();
    }

        if (systemReady) {

    function initMap() {
        if (initRetries > 25) {
            log("CRITICAL: Failed to initialize after multiple attempts. Check API configuration.");
            document.getElementById('load-status').innerText = "ERROR: SYSTEM OFFLINE";
            return;
        }
        initRetries++;
        log(`Init Attempt #${initRetries}...`);
        
        // Setup Music (only if files exist)
        if (!bgMusic && musicFiles.length > 0) {
            const musicIndex = Math.floor(Math.random() * musicFiles.length);
            log("Selected Track: " + musicFiles[musicIndex]);
            bgMusic = new Audio(musicFiles[musicIndex]);
            bgMusic.loop = true;
        }

        const config = locations[Math.floor(Math.random() * locations.length)];
        const sv = new google.maps.StreetViewService();
        log("Searching city: " + config.name);

        const latLng = { lat: config.lat, lng: config.lng };

        // 1. Find a valid starting point for the player
        sv.getPanorama({ location: latLng, radius: 500, source: 'outdoor' }, (startData, startStatus) => {
            if (startStatus === "OK" && startData.links.length > 0) {
                log("Primary node established.");
                const startPos = startData.location.latLng;
                
                // 2. Find a valid street node 70-120m away for Silvy
                const heading = Math.random() * 360;
                const searchDist = 70 + Math.random() * 50;
                const searchTarget = google.maps.geometry.spherical.computeOffset(startPos, searchDist, heading);

                log("Scanning for target placement...");
                sv.getPanorama({ location: searchTarget, radius: 250, source: 'outdoor' }, (targetData, targetStatus) => {
                    if (targetStatus === "OK") {
                        silvyLatLng = targetData.location.latLng;
                        log("Target anchored to grid.");
                        setupPano(startPos, config.name);
                    } else {
                        log("Target off-grid (" + targetStatus + "). Re-routing...");
                        setTimeout(initMap, 1000); 
                    }
                });
            } else {
                log("City nodes unavailable (" + startStatus + "). Re-routing...");
                setTimeout(initMap, 1000);
            }
        });
    }

    function setupPano(latLng, cityName) {
        log("Viewport Sync: " + cityName);
        document.getElementById('city-display').innerText = "LOCATION: " + cityName;
        
        // Update HUD
        document.getElementById('hud-target-label').innerText = "TARGET: " + targetName;
        
        panorama = new google.maps.StreetViewPanorama(document.getElementById("pano"), {
            position: latLng,
            pov: { heading: 0, pitch: 0 },
            zoom: 1,
            disableDefaultUI: true,
            clickToGo: true,
            showRoadLabels: false
        });

        silvyMarker = new google.maps.Marker({
            position: silvyLatLng,
            icon: {
                url: targetImageUrl,
                scaledSize: new google.maps.Size(150, 150),
                anchor: new google.maps.Point(75, 75)
            }
        });

        silvyMarker.addListener('click', executePunch);

        const checkPanoStatus = () => {
            const status = panorama.getStatus();
            if (status === "OK") {
                log("Uplink Established.");
                document.getElementById('load-status').innerText = "SATELLITE UPLINK STABLE.";
                systemReady = true;
                checkStartAvailability();
            } else if (status === "ZERO_RESULTS") {
                log("Node empty. Re-calculating...");
                initMap();
            } else if (status) {
                log("Uplink Error: " + status);
            }
        };

        panorama.addListener("status_changed", checkPanoStatus);
        checkPanoStatus(); // Run once in case it's already ready

        panorama.addListener("position_changed", updateGameState);
        
        window.gm_authFailure = () => {
            log("CRITICAL: API Auth Failure. Verify Key/Billing.");
            document.getElementById('load-status').innerText = "ERROR: AUTHENTICATION FAILURE";
        };
    }

    function updateGameState() {
        if (!panorama || !silvyLatLng || !silvyMarker) return;
        
        const currentPos = panorama.getPosition();
        const dist = google.maps.geometry.spherical.computeDistanceBetween(currentPos, silvyLatLng);
        
        const intensity = Math.max(0, Math.min(100, (150 - dist) / 1.4));
        document.getElementById('radar-bar').style.width = intensity + '%';
        document.getElementById('radar-label').innerText = `PROXIMITY: ${Math.round(dist)}m`;

        const stealthStatusEl = document.getElementById('stealth-status');
        
        // STEALTH LOGIC: Visible only within 15 meters
        if (dist <= 15) {
            silvyMarker.setMap(panorama);
            if (stealthStatusEl) {
                stealthStatusEl.innerText = "EXPOSED";
                stealthStatusEl.style.color = "red";
            }
        } else {
            silvyMarker.setMap(null);
            if (stealthStatusEl) {
                stealthStatusEl.innerText = "ACTIVE";
                stealthStatusEl.style.color = "cyan";
            }
        }
    }

    function executePunch() {
        if(bgMusic) bgMusic.pause();
        
        const explosionContainer = document.getElementById('explosion-container');
        const explosionVideo = document.getElementById('explosion-video');
        
        silvyMarker.setMap(null);
        document.getElementById('flash').classList.add('punch-flash');
        document.body.style.animation = "shake-anim 0.1s infinite";

        explosionContainer.style.display = 'flex';
        explosionVideo.play().catch(e => log("Video Error: " + e));

        explosionVideo.onended = () => {
            explosionContainer.style.display = 'none';
            document.getElementById('win-overlay').style.display = 'flex';
            document.querySelector('#win-overlay p').innerText = `${targetName} CAPTURED WITHIN 15 METERS.`;
            document.body.style.animation = "";
        };

        setTimeout(() => {
            if (document.getElementById('win-overlay').style.display !== 'flex') {
                explosionContainer.style.display = 'none';
                document.getElementById('win-overlay').style.display = 'flex';
                document.querySelector('#win-overlay p').innerText = `${targetName} CAPTURED WITHIN 15 METERS.`;
                document.body.style.animation = "";
            }
        }, 5000);
    }
</script>
